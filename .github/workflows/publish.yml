name: Publish to VS Code Marketplace

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          PREV=$(git show HEAD~1:package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "none")
          CURR=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "prev=$PREV  curr=$CURR"
          echo "changed=$( [ "$PREV" != "$CURR" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: '20'

      - name: Publish
        if: steps.check.outputs.changed == 'true'
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
